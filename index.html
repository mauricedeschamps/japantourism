<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Japan Traveler's Picks</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2f">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    /* ダークモード (デフォルト) */
    :root {
      --bg: #121212;
      --surface: #1e1e2f;
      --surface-light: #2a2a3a;
      --text: #f0f0f0;
      --text-secondary: #b0b0c0;
      --primary: #ff7b2c;
      --primary-dark: #e05a1a;
      --border: #3a3a4a;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    body.light {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface-light: #f1f3f5;
      --text: #212529;
      --text-secondary: #495057;
      --primary: #e65c00;
      --primary-dark: #b34700;
      --border: #dee2e6;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* ヘッダー */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--primary);
    }
    h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--primary), #ffaa66);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .controls {
      display: flex;
      gap: 0.8rem;
    }
    button {
      background: var(--surface-light);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
    }
    button:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* スポンサー枠 */
    .sponsor-area {
      background: var(--surface);
      border-radius: 24px;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: center;
      border: 1px dashed var(--border);
    }
    .sponsor-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-secondary);
      margin-bottom: 0.8rem;
    }
    .sponsor-flex {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      align-items: center;
    }
    .sponsor-item img {
      max-height: 60px;
      width: auto;
      border-radius: 12px;
    }
    .sponsor-item a {
      display: block;
    }

    /* サービスカードリスト */
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin: 1rem 0;
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px rgba(0,0,0,0.2);
    }
    .card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--surface-light);
    }
    .card-content {
      padding: 1rem;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* 詳細ページビュー */
    .detail-view {
      background: var(--surface);
      border-radius: 32px;
      padding: 1.5rem;
      margin: 1rem 0;
      border: 1px solid var(--border);
    }
    .detail-img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 24px;
      margin-bottom: 1.5rem;
    }
    .detail-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }
    .detail-desc {
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    .official-link {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 0.5rem;
    }
    .back-btn {
      background: var(--surface-light);
      border: none;
      margin-bottom: 1rem;
    }

    /* フッター */
    .footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      text-align: center;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    /* ユーティリティ */
    .hidden {
      display: none;
    }
    .note-code {
      font-family: monospace;
      font-size: 0.7rem;
      background: var(--surface-light);
      padding: 0.2rem 0.4rem;
      border-radius: 8px;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body class="dark">
<div class="app">
  <div class="header">
    <h1 data-en="Japan Traveler's Picks" data-ja="日本の旅おすすめサービス">Japan Traveler's Picks</h1>
    <div class="controls">
      <button id="langBtn" aria-label="Switch language">日本語</button>
      <button id="themeBtn" aria-label="Switch theme">☀️ ライト</button>
    </div>
  </div>

  <!-- 上部スポンサー -->
  <div id="topSponsor" class="sponsor-area"></div>

  <!-- メイン一覧ビュー -->
  <div id="listView">
    <div id="serviceList" class="service-grid"></div>
  </div>

  <!-- 詳細ビュー（初期非表示） -->
  <div id="detailView" class="detail-view hidden">
    <button id="backButton" class="back-btn">← <span data-en="Back" data-ja="戻る">Back</span></button>
    <img id="detailImg" class="detail-img" alt="">
    <h2 id="detailTitle" class="detail-title"></h2>
    <p id="detailDesc" class="detail-desc"></p>
    <a id="detailLink" class="official-link" target="_blank" rel="noopener noreferrer">
      <span data-en="Visit Official Website" data-ja="公式サイトへ">Visit Official Website</span>
    </a>
  </div>

  <!-- 下部スポンサー -->
  <div id="bottomSponsor" class="sponsor-area"></div>

  <div class="footer">
    Contact us<br>
    <a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a>
  </div>
</div>

<script>
  // --------------------------------------------------------------
  // データ定義： サービス一覧 (画像URL・説明は後から差し替え可)
  // 各項目: id, name_en, name_ja, desc_en, desc_ja, imageUrl, officialUrl
  // 画像は後で自分の画像URLに変更してください（例: "images/xxx.jpg"）
  // --------------------------------------------------------------
  const services = [
    {
      id: 1,
      name_en: "JNTO / Travel Japan",
      name_ja: "JNTO / 日本政府観光局",
      desc_en: "Official Japan National Tourism Organization site. Reliable travel guides, events, multi-language support.",
      desc_ja: "日本政府観光局公式サイト。多言語対応の信頼できる旅行ガイド、イベント情報。",
      imageUrl: "https://placehold.co/600x400/FF7B2C/white?text=JNTO",
      officialUrl: "https://www.japan.travel/en/"
    },
    {
      id: 2,
      name_en: "Japan Guide",
      name_ja: "ジャパンガイド",
      desc_en: "Comprehensive travel guide since 1996, especially popular among Western travelers.",
      desc_ja: "1996年から続く詳細な総合旅行ガイド。西洋人旅行者に特に人気。",
      imageUrl: "https://placehold.co/600x400/2C7AFF/white?text=Japan+Guide",
      officialUrl: "https://www.japan-guide.com/"
    },
    {
      id: 3,
      name_en: "Time Out Tokyo",
      name_ja: "タイムアウト東京",
      desc_en: "Local events, restaurants, and 'what to do this weekend' from global media.",
      desc_ja: "世界的メディアによる東京のイベント・レストラン情報。週末の過ごし方に強い。",
      imageUrl: "https://placehold.co/600x400/FF4444/white?text=Time+Out+Tokyo",
      officialUrl: "https://www.timeout.com/tokyo"
    },
    {
      id: 4,
      name_en: "Tokyo Cheapo",
      name_ja: "トーキョーチーポ",
      desc_en: "Budget travel tips, free events, and money-saving hacks for Tokyo.",
      desc_ja: "節約旅行のヒント、無料イベント、東京のお得情報。",
      imageUrl: "https://placehold.co/600x400/33AA33/white?text=Tokyo+Cheapo",
      officialUrl: "https://tokyocheapo.com/"
    },
    {
      id: 5,
      name_en: "Japan Travel by NAVITIME",
      name_ja: "NAVITIME ジャパントラベル",
      desc_en: "Navigation app with transit routes, JR Pass info, offline Wi-Fi spots.",
      desc_ja: "乗り換え案内、JRパス情報、オフラインWi-Fiスポット対応のナビアプリ。",
      imageUrl: "https://placehold.co/600x400/AA66FF/white?text=NAVITIME",
      officialUrl: "https://japantravel.navitime.com/"
    },
    {
      id: 6,
      name_en: "byFood",
      name_ja: "byFood",
      desc_en: "Japanese food experiences: cooking classes, market tours, and more.",
      desc_ja: "料理教室やマーケットツアーなど日本食体験の予約プラットフォーム。",
      imageUrl: "https://placehold.co/600x400/FF9933/white?text=byFood",
      officialUrl: "https://byfood.com/"
    },
    {
      id: 7,
      name_en: "Klook",
      name_ja: "Klook",
      desc_en: "Tickets, tours, SIM cards – popular among Western tourists for activities.",
      desc_ja: "チケット、ツアー、SIMカード予約。アクティビティ予約で西洋人人気。",
      imageUrl: "https://placehold.co/600x400/1E88E5/white?text=Klook",
      officialUrl: "https://www.klook.com/"
    },
    {
      id: 8,
      name_en: "Matcha",
      name_ja: "Matcha",
      desc_en: "Web magazine for inbound tourists featuring culture, sightseeing, and experiences.",
      desc_ja: "訪日外国人向けに文化・観光・体験情報を発信するWebメディア。",
      imageUrl: "https://placehold.co/600x400/66BB6A/white?text=Matcha",
      officialUrl: "https://matcha-jp.com/en/"
    }
  ];

  // --------------------------------------------------------------
  // スポンサーデータ (画像URLとリンク先は後から自由に追加・変更可能)
  // 各項目: imageUrl, linkUrl, alt
  // --------------------------------------------------------------
  let sponsors = [
    { imageUrl: "https://placehold.co/300x80/e0e0e0/333?text=Sponsor+1", linkUrl: "https://example.com/sponsor1", alt: "Sponsor 1" },
    { imageUrl: "https://placehold.co/300x80/e0e0e0/333?text=Sponsor+2", linkUrl: "https://example.com/sponsor2", alt: "Sponsor 2" }
  ];
  // スポンサー追加の簡単な案内：
  // sponsors配列に { imageUrl: "あなたの画像URL", linkUrl: "リンク先URL", alt: "説明" } を追加するだけです。
  // 上下両方に同じスポンサーが表示されます。

  // 言語とテーマ
  let currentLang = "en";   // 'en' or 'ja'
  let currentTheme = "dark"; // 'dark' or 'light'

  // DOM 要素
  const listView = document.getElementById('listView');
  const detailView = document.getElementById('detailView');
  const serviceListDiv = document.getElementById('serviceList');
  const backBtn = document.getElementById('backButton');
  const detailImg = document.getElementById('detailImg');
  const detailTitle = document.getElementById('detailTitle');
  const detailDesc = document.getElementById('detailDesc');
  const detailLink = document.getElementById('detailLink');
  const langBtn = document.getElementById('langBtn');
  const themeBtn = document.getElementById('themeBtn');
  const topSponsorDiv = document.getElementById('topSponsor');
  const bottomSponsorDiv = document.getElementById('bottomSponsor');

  // レンダリング関数
  function renderSponsors() {
    const renderSponsorBlock = (container) => {
      if (!container) return;
      if (!sponsors.length) {
        container.innerHTML = `<div class="sponsor-title">✨ SPONSOR ✨</div><div class="note-code">[ Add sponsors in JS array ]</div>`;
        return;
      }
      let html = `<div class="sponsor-title">✨ SPONSOR ✨</div><div class="sponsor-flex">`;
      sponsors.forEach(sp => {
        html += `<div class="sponsor-item"><a href="${sp.linkUrl}" target="_blank" rel="sponsored"><img src="${sp.imageUrl}" alt="${sp.alt}" loading="lazy"></a></div>`;
      });
      html += `</div><div class="note-code">💡 画像とURLを変更するには sponsors 配列を編集</div>`;
      container.innerHTML = html;
    };
    renderSponsorBlock(topSponsorDiv);
    renderSponsorBlock(bottomSponsorDiv);
  }

  // サービス一覧描画
  function renderServiceList() {
    const lang = currentLang;
    serviceListDiv.innerHTML = '';
    services.forEach(service => {
      const name = lang === 'en' ? service.name_en : service.name_ja;
      const desc = lang === 'en' ? service.desc_en : service.desc_ja;
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-id', service.id);
      card.innerHTML = `
        <img class="card-img" src="${service.imageUrl}" alt="${name}" loading="lazy">
        <div class="card-content">
          <div class="card-title">${name}</div>
          <div class="card-desc">${desc.substring(0, 80)}${desc.length > 80 ? '…' : ''}</div>
        </div>
      `;
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        showDetail(service.id);
      });
      serviceListDiv.appendChild(card);
    });
  }

  // 詳細表示
  function showDetail(id) {
    const service = services.find(s => s.id === id);
    if (!service) return;
    const lang = currentLang;
    const title = lang === 'en' ? service.name_en : service.name_ja;
    const description = lang === 'en' ? service.desc_en : service.desc_ja;
    detailImg.src = service.imageUrl;
    detailTitle.innerText = title;
    detailDesc.innerText = description;
    detailLink.href = service.officialUrl;
    // リンクテキストも言語切替対応
    const linkSpan = detailLink.querySelector('span');
    if (linkSpan) {
      linkSpan.innerText = (lang === 'en') ? 'Visit Official Website' : '公式サイトへ';
    }
    listView.classList.add('hidden');
    detailView.classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // history 管理
    history.pushState({ view: 'detail', id: id }, '', `#detail-${id}`);
  }

  function backToList() {
    listView.classList.remove('hidden');
    detailView.classList.add('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    history.pushState({ view: 'list' }, '', '#');
  }

  // 言語切り替え（全テキスト更新）
  function updateLanguage() {
    const lang = currentLang;
    langBtn.innerText = lang === 'en' ? '日本語' : 'English';
    // ヘッダータイトル
    const h1 = document.querySelector('h1');
    if (h1) {
      h1.innerText = lang === 'en' ? h1.getAttribute('data-en') : h1.getAttribute('data-ja');
    }
    // 戻るボタンのテキスト
    const backSpan = backBtn.querySelector('span');
    if (backSpan) {
      backSpan.innerText = lang === 'en' ? 'Back' : '戻る';
    }
    // 詳細ページのリンクテキスト
    const linkSpan = detailLink.querySelector('span');
    if (linkSpan && !detailView.classList.contains('hidden')) {
      linkSpan.innerText = lang === 'en' ? 'Visit Official Website' : '公式サイトへ';
    }
    // リスト再描画
    if (!detailView.classList.contains('hidden')) {
      // 詳細表示中なら、現在開いている詳細のテキストを更新
      const activeId = getCurrentDetailIdFromUrl();
      if (activeId) showDetail(activeId);
    } else {
      renderServiceList();
    }
    // 全ての data-en/ja 対応要素（必要に応じて）
    document.querySelectorAll('[data-en][data-ja]').forEach(el => {
      if (!el.classList || !el.classList.contains('hidden')) {
        el.innerText = lang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-ja');
      }
    });
  }

  function getCurrentDetailIdFromUrl() {
    const hash = window.location.hash;
    if (hash.startsWith('#detail-')) {
      const id = parseInt(hash.split('-')[1]);
      if (!isNaN(id)) return id;
    }
    return null;
  }

  // テーマ切り替え
  function setTheme(theme) {
    currentTheme = theme;
    if (theme === 'light') {
      document.body.classList.add('light');
      themeBtn.innerHTML = '🌙 ダーク';
    } else {
      document.body.classList.remove('light');
      themeBtn.innerHTML = '☀️ ライト';
    }
    localStorage.setItem('theme', theme);
  }

  function toggleTheme() {
    setTheme(currentTheme === 'dark' ? 'light' : 'dark');
  }

  // 言語切り替え保存
  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('language', lang);
    updateLanguage();
  }

  function toggleLanguage() {
    setLanguage(currentLang === 'en' ? 'ja' : 'en');
  }

  // 初期化＆履歴管理
  function init() {
    // テーマ復元
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) setTheme(savedTheme);
    else setTheme('dark'); // ダークメイン

    const savedLang = localStorage.getItem('language');
    if (savedLang === 'ja' || savedLang === 'en') setLanguage(savedLang);
    else setLanguage('en');

    renderSponsors();
    renderServiceList();

    // ハッシュによる詳細リンク対応
    const hashId = getCurrentDetailIdFromUrl();
    if (hashId && services.find(s => s.id === hashId)) {
      showDetail(hashId);
    } else {
      backToList();
    }

    // イベント
    backBtn.addEventListener('click', backToList);
    langBtn.addEventListener('click', toggleLanguage);
    themeBtn.addEventListener('click', toggleTheme);

    window.addEventListener('popstate', (event) => {
      if (event.state && event.state.view === 'detail') {
        if (event.state.id) showDetail(event.state.id);
        else backToList();
      } else {
        backToList();
      }
    });
  }

  init();
</script>
</body>
</html>
